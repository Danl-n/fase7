{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}StreamMusic{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/estilo.css' %}" rel="stylesheet">
</head>
<body class="app-body">

  <nav class="navbar navbar-dark app-topbar d-md-none">
    <div class="container-fluid">
      <span class="navbar-brand"><i class="bi bi-broadcast"></i> StreamMusic</span>
      <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="sidebarOffcanvas">
    <div class="offcanvas-header">
      <span class="navbar-brand mb-0"><i class="bi bi-broadcast"></i> StreamMusic</span>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0 d-flex flex-column">
      {% include 'usuario/_sidebar.html' %}
    </div>
  </div>

  <div class="app-layout">
    <aside class="app-sidebar d-none d-md-flex flex-column">
      {% include 'usuario/_sidebar.html' %}
    </aside>

    <main class="app-contenido">
      {% if messages %}
        <div class="mensajes-flash">
          {% for m in messages %}
            <div class="alert alert-{{ m.tags }} alert-dismissible fade show" role="alert">
              {{ m }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block contenido %}{% endblock %}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
